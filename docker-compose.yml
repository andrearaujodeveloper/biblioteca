services:

  postgres:
    image: postgres:16
    container_name: postgres_api
    restart: always

    environment:
      POSTGRES_USER: api_user${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: